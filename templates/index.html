<!DOCTYPE html>
<html>
    <head>
        <title>{{ config.get('ENTITY_NAME', 'OpenModuli') }} - Self-hosted forms</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    </head>

    <body style="--primary-color: {{ config.get('PRIMARY_COLOR', '#1d4ed8') }}; --primary-color-dark: {{ config.get('PRIMARY_COLOR', '#1d4ed8') }}; --secondary-color: {{ config.get('SECONDARY_COLOR', '#4b5563') }};">
        <main class="container">
            <header>
                {% set logo = config.get('ENTITY_LOGO', '') %}
                {% if logo and logo.startswith('static/') %}
                    <img src="{{ url_for('static', filename=logo[7:]) }}" alt="Logo" class="asset-image" style="max-width:120px;margin:0 auto 12px auto;" />
                {% endif %}
                <h1>{{ config.get('ENTITY_NAME', 'OpenModuli') }}</h1>
            </header>
            <a href="{{ url_for('login') }}">Accedi al Pannello di Controllo</a>
            
            {% include 'partials/footer.html' %}
        </main>
    </body>
</html>
