<!DOCTYPE html>
<html>
    <head>
        <title>Login - {{ config.get('ENTITY_NAME', 'OpenModuli') }}</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
        <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}" />
        <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}" />
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
    </head>
    <body style="--primary-color: {{ config.get('PRIMARY_COLOR', '#1d4ed8') }}; --primary-color-dark: {{ config.get('PRIMARY_COLOR', '#1d4ed8') }}; --secondary-color: {{ config.get('SECONDARY_COLOR', '#4b5563') }};">
        <!--! @file login.html
            @brief Login template for OpenModuli.
            
            @details
            Main login interface for accessing the administrative panel.
            Includes form for username and password submission.
            Supports dynamic server-side rendering with Jinja2 templating.
        -->

        <!--! @brief Password error dialog.
            @details Modal dialog for displaying password error message.
            Provides a cancel action.
        -->
        <dialog id="dialog-password-error">
            <p><strong>ERRORE<strong>: Password non valida</p>
            <strong id="dialog-filename"></strong>
            <div class="dialog-actions">
                <button id="dialog-password-error-discard">Annulla</button>
            </div>
        </dialog>
        
        <main class="container">
            <header>
                {% set logo = config.get('ENTITY_LOGO', '') %}
                {% if logo and logo.startswith('static/') %}
                    <img src="{{ url_for('static', filename=logo[7:]) }}" alt="Logo" class="asset-image" style="max-width:120px;margin:0 auto 12px auto;" />
                {% endif %}
                <h1>Pannello di Controllo - {{ config.get('ENTITY_NAME', 'OpenModuli') }}</h1>
            </header>
            <!--! @section footer
                @brief Application footer.
                @details Contains copyright information and author attribution.
            -->

            <div class="login-box">
                <img class="login-icon" src="{{ url_for('static', filename='icons/person.png') }}"/>
                {% if error %}
                    <div class="banner banner-error">{{ error }}</div>
                {% endif %}
                <form action="/login" method="POST" class="login-form">
                    <label for="password">Password:</label><br/>
                    <input type="password" id="password" name="password" placeholder="Inserisci la password" required /><br/><br/>
                    <!--
                    <label for="otp-code">Codice OTP:</label><br/>
                    <input type="text" id="otp-code" name="otp-code" placeholder="Inserisci il codice OTP" required /><br/><br/>
                    -->
                    <p>
                        <button type="submit" class="btn_success">Accedi</button>
                        <button type="button" id="forgot-password-btn" class="btn_link">Password dimenticata?</button>
                    </p>
                </form>
            </div>

            {% include 'partials/footer.html' %}
        </main>
    </body>
</html>
