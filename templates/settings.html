<!DOCTYPE html>
<html>
    <head>
        <title>Impostazioni - OpenModuli</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
        <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}" />
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <script src="{{ url_for('static', filename='admin.js') }}"></script>
    </head>
    <body>
        <!--! @file settings.html
            @brief Settings page template for OpenModuli.
            
            @details
            Provides interface for configuring application settings such as file paths and server controls.
            Includes sections for path configuration, personalization options, and server management actions.
            Supports dynamic server-side rendering with Jinja2 templating.
        -->
        <main class="container">
            <header>
                <h1>Impostazioni - OpenModuli</h1>
            </header>

            <div>
                <form action="/admin/settings/save" method="POST" enctype="multipart/form-data">
                    <!--** Here goes the settings for defining path
                    - Form files are stored in a specific directory, and generated PDFs in another. 
                    Here the admin can set those paths. */ -->
                    <section title="Percorsi">
                        <span>Percorso dei moduli: </span><input type="text" name="forms_path"/><br/>
                        <span>Percorso dei PDF: </span><input type="text" name="pdf_path"/><br/>
                    </section>
                    <section title="Informazioni Ente">
                        <span>Logo: </span><input type="file" name="logo_image"/><button>Ripristina</button><br/>
                        <span>Nome Ente: </span><input type="text" name="entity_name"/><button>Ripristina</button><br/>
                        <span>Indirizzo:</span><input type="text" name="entity_address"/><button>Ripristina</button><br/>
                        <span>Email: </span><input type="text" name="entity_contacts"/><button>Ripristina</button><br/>
                        <span>Telefono: </span><input type="text" name="entity_phone"/><button>Ripristina</button><br/>
                    </section>
                    <section title="Personalizzazione">
                        <span>Colore primario: </span><input type="color" name="primary_color"/><button>Ripristina</button><br/>
                        <span>Colore secondario: </span><input type="color" name="secondary_color"/><button>Ripristina</button><br/>
                        <span>Immagine di Sfondo: </span><input type="file" name="background_image"/><button>Ripristina</button><br/>
                    </section>
                    <p>
                        <button type="submit">Salva Cambiamenti</button>
                        <button type="reset">Ripristina</button>
                    </p>
                </form>
            </div>

            <div>
                <form action="/admin/settings/change-psswd" method="POST" enctype="multipart/form-data">
                    <section title="Password">
                        <span>Password attuale: </span><input type="password" name="current_password"/><br/>
                        <span>Nuova Password: </span><input type="password" name="new_password"/><br/>
                        <span>Conferma Password: </span><input type="password" name="confirm_password"/><br/>
                    </section>
                    <p>
                        <button type="submit">Salva Cambiamenti</button>
                        <button type="reset">Ripristina</button>
                    </p>
                </form>
            </div>

            <div>
                <h2>Controlli del server</h2>
                <button onclick="onReloadConfigurationClicked()">Ricarica Configurazione</button>
                <button onclick="onRebootApplicationClicked()">Riavvia OpenModuli</button>
                <button onclick="onRebootServerClicked()">Riavvia Server</button>
                <button onclick="onShutdownServerClicked()">Spegni Server</button>
            </div>

            {% include 'partials/footer.html' %}
        </main>
    </body>
</html>
